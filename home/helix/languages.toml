[[language]]
name = "markdown"
indent = { tab-width = 4, unit = "  " }
language-servers = [ "marksman", "hx-lsp", "harper-ls", "markdown-oxide" ]
file-types = [ "md", "markdown", "mdx" ]

[[language]]
name = "meson"
scope = "source.build"
file-types = [ "build" ]
comment-token = "#"
indent = { tab-width = 4, unit = "    " }

[[language]]
name = "yaml"
scope = "source.yaml"
comment-token = "#"
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "git-commit"
soft-wrap = { enable = true, wrap-at-text-width = true }

[[language]]
name = "ini"
scope = "source.ini"
file-types = [ "ini", "service", "cfg", { glob = ".editorconfig" } ]

[language-server.texlab.config.texlab.chktex]
onOpenAndSave = true
onEdit = true

[language-server.texlab.config.texlab.build]
auxDirectory = "build"
logDirectory = "build"
pdfDirectory = "build"

forwardSearchAfter = true
onSave = true

executable = "latexmk"
args = [
  "-pdf",
  "-interaction=nonstopmode",
  "-synctex=1",
  "-output-directory=build",
  "%f",
]

[language-server.harper-ls]
command = "harper-ls"
args = [ "--stdio" ]

[language-server.hx-lsp]
command = "hx-lsp"

[language-server.yaml]
command = "yaml-language-server"
args = [ "--stdio" ]
